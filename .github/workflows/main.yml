name: CI EnerGest

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          
      - name: Install Dependencies
        run: |
          # Entra direto na pasta backend (sem o prefixo Energest/)
          cd backend
          python -m pip install --upgrade pip
          pip install pytest httpx joblib pandas fastapi uvicorn
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run Tests
        run: |
          cd backend
          export PYTHONPATH=$PYTHONPATH:.
          python -m pytest

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: |
          # Entra direto na pasta frontend
          cd frontend
          npm install
          
      - name: Build Frontend (Check)
        run: |
          cd frontend
          npm run build || echo "Build check finalizado"