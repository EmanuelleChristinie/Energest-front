name: CI EnerGest

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install Dependencies
        run: |
          # Entra na pasta Energest e depois em backend
          cd Energest/backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest httpx
      - name: Run Tests
        run: |
          cd Energest/backend
          python -m pytest

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: |
          # Entra na pasta Energest e depois em frontend
          cd Energest/frontend
          npm install
      - name: Build Frontend (Check)
        run: |
          cd Energest/frontend
          npm run build || echo "Build check finalizado"